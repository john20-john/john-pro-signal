<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JOHN PRO | ADVANCED SIGNAL GENERATOR</title>
    <style>
        :root {
            --primary: #f1c40f;
            --secondary: #3498db;
            --accent: #e67e22;
            --bg-dark: #0a0b10;
            --glass: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background: var(--bg-dark);
            background-image:
                radial-gradient(circle at 20% 30%, rgba(241, 196, 15, 0.05) 0%, transparent 50%),
                radial-gradient(circle at 80% 70%, rgba(52, 152, 219, 0.05) 0%, transparent 50%);
            color: #ffffff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px;
            overflow-x: hidden;
        }

        .container {
            max-width: 900px;
            width: 100%;
            background: var(--glass);
            backdrop-filter: blur(15px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 32px;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.5);
        }

        header {
            margin-bottom: 30px;
        }

        h1 {
            font-size: 2.5rem;
            letter-spacing: -1px;
            margin-bottom: 10px;
            font-weight: 800;
        }

        .gold-text {
            background: linear-gradient(135deg, #f1c40f, #f39c12);
            background-clip: text;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .blue-text {
            color: var(--secondary);
            text-shadow: 0 0 20px rgba(52, 152, 219, 0.3);
        }

        .subtitle {
            color: #8892b0;
            font-size: 1.05rem;
        }

        .section-title {
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--primary);
            margin: 18px 0 12px;
            font-weight: 600;
        }

        .controls {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
            gap: 12px;
            margin-bottom: 8px;
        }

        .control-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            padding: 12px;
        }

        .control-card label {
            display: block;
            font-size: 0.82rem;
            color: #9fb0d0;
            margin-bottom: 8px;
        }

        .inline-control {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-top: 8px;
            font-size: 0.85rem;
            color: #c7d4ee;
        }

        .inline-control input[type="checkbox"] {
            accent-color: var(--primary);
        }

        .mini-btn {
            width: 100%;
            margin-top: 8px;
            border: 1px solid var(--glass-border);
            background: rgba(255, 255, 255, 0.05);
            color: #fff;
            border-radius: 8px;
            padding: 8px 10px;
            font-size: 0.86rem;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s ease;
        }

        .mini-btn:hover {
            border-color: var(--primary);
            background: rgba(241, 196, 15, 0.12);
        }

        select,
        input[type="time"] {
            width: 100%;
            background: rgba(255, 255, 255, 0.05);
            color: #fff;
            border: 1px solid var(--glass-border);
            border-radius: 8px;
            padding: 10px;
            font-size: 0.95rem;
        }

        option {
            color: #111;
        }

        #currency-list {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 12px;
            margin-bottom: 20px;
        }

        .pair-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--glass-border);
            padding: 15px;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.25s ease;
            font-weight: 500;
            color: #ccd6f6;
            user-select: none;
        }

        .pair-card:hover {
            background: rgba(255, 255, 255, 0.08);
            transform: translateY(-2px);
            border-color: var(--primary);
        }

        .pair-card.selected {
            background: var(--primary);
            color: #000;
            border-color: var(--primary);
            box-shadow: 0 0 18px rgba(241, 196, 15, 0.25);
        }

        .actions {
            display: flex;
            gap: 12px;
            justify-content: center;
            margin-top: 12px;
            flex-wrap: wrap;
        }

        button {
            padding: 14px 24px;
            font-size: 1rem;
            font-weight: 700;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.25s;
            border: none;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .btn-generate {
            background: var(--primary);
            color: #000;
        }

        .btn-generate:hover {
            background: #ffdb4d;
            transform: scale(1.02);
            box-shadow: 0 10px 20px rgba(241, 196, 15, 0.2);
        }

        .btn-copy {
            background: transparent;
            border: 1px solid var(--glass-border);
            color: #fff;
        }

        .btn-copy:hover {
            background: var(--glass-border);
        }

        #loading-spinner {
            display: none;
            margin: 22px auto;
            width: 40px;
            height: 40px;
            border: 3px solid rgba(241, 196, 15, 0.1);
            border-top: 3px solid var(--primary);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            100% { transform: rotate(360deg); }
        }

        #trades {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 15px;
            margin-top: 24px;
            width: 100%;
        }

        .signal-card {
            background: linear-gradient(145deg, rgba(255, 255, 255, 0.05), rgba(255, 255, 255, 0.01));
            border-radius: 16px;
            padding: 18px;
            border: 1px solid var(--glass-border);
            text-align: left;
            animation: fadeIn 0.5s ease forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .signal-card .pair {
            font-weight: 700;
            font-size: 0.9rem;
            color: #8892b0;
            margin-bottom: 8px;
            display: block;
        }

        .signal-card .time {
            font-size: 1.3rem;
            font-weight: 800;
            margin-bottom: 4px;
        }

        .signal-card .direction {
            font-size: 0.8rem;
            font-weight: 800;
            padding: 4px 12px;
            border-radius: 20px;
            display: inline-block;
        }

        .dir-call {
            background: rgba(46, 204, 113, 0.1);
            color: #2ecc71;
        }

        .dir-put {
            background: rgba(231, 76, 60, 0.1);
            color: #e74c3c;
        }

        #notification {
            position: fixed;
            bottom: 30px;
            right: 30px;
            padding: 12px 18px;
            background: var(--secondary);
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            display: none;
            z-index: 1000;
            animation: slideUp 0.3s ease;
        }

        @keyframes slideUp {
            from { transform: translateY(100px); }
            to { transform: translateY(0); }
        }

        @media (max-width: 600px) {
            .container {
                padding: 20px 12px;
            }
            h1 {
                font-size: 1.9rem;
            }
            #currency-list {
                grid-template-columns: 1fr 1fr;
            }
        }
    </style>
</head>
<body>
    <div id="notification"></div>

    <div class="container">
        <header>
            <h1><span class="gold-text">JOHN PRO</span> <span class="blue-text">AI</span></h1>
            <p class="subtitle">Next-Generation Binary Options Signal Engine</p>
        </header>

        <div class="section-title">Generation Settings</div>
        <div class="controls">
            <div class="control-card">
                <label for="generator-model">Generator Model</label>
                <select id="generator-model">
                    <option value="M1_3">Model A (M1, every 3 minutes)</option>
                    <option value="M1_5">Model B (M1, every 5 minutes)</option>
                    <option value="M15_15">Model C (M15 OTC, every 15 minutes)</option>
                </select>
            </div>
            <div class="control-card">
                <label for="start-time">Start Time</label>
                <input id="start-time" type="time" value="10:00">
                <button class="mini-btn" id="set-now-btn" type="button">Set Start = Current Time</button>
                <label class="inline-control" for="auto-start-now">
                    <input id="auto-start-now" type="checkbox">
                    Auto start from current time
                </label>
            </div>
            <div class="control-card">
                <label for="end-time">End Time</label>
                <input id="end-time" type="time" value="23:59">
            </div>
            <div class="control-card">
                <label for="pair-limit">Number of pairs to use</label>
                <select id="pair-limit">
                    <option value="1">1 pair</option>
                    <option value="2">2 pairs</option>
                    <option value="3" selected>3 pairs</option>
                    <option value="4">4 pairs</option>
                    <option value="5">5 pairs</option>
                </select>
            </div>
            <div class="control-card">
                <label for="market-mode">Market Mode</label>
                <select id="market-mode">
                    <option value="trend">Strong Trend</option>
                    <option value="range">Range / Sideways</option>
                    <option value="hybrid" selected>Hybrid Smart</option>
                </select>
            </div>
            <div class="control-card">
                <label for="last-direction">Last direction hint</label>
                <select id="last-direction">
                    <option value="AUTO" selected>Auto</option>
                    <option value="PUT">Last was PUT</option>
                    <option value="CALL">Last was CALL</option>
                </select>
            </div>
        </div>

        <div class="section-title">Select Trading Assets</div>
        <div id="currency-list"></div>

        <div class="actions">
            <button class="btn-generate" onclick="generateTrades()">
                <svg width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"/></svg>
                Analyze Market
            </button>
            <button class="btn-copy" onclick="copyTrades()">
                <svg width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 5H6a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2v-1M8 5a2 2 0 002 2h2a2 2 0 002-2M8 5a2 2 0 012-2h2a2 2 0 012 2m0 0h2a2 2 0 012 2v3m2 4H10m0 0l3-3m-3 3l3 3"/></svg>
                Copy All
            </button>
        </div>

        <div id="loading-spinner"></div>
        <div id="trades"></div>
    </div>

    <script>
        const pairs = [
            "AUD/USD (OTC)", "EUR/GBP (OTC)", "USD/CAD (OTC)", "EUR/JPY (OTC)",
            "GBP/JPY (OTC)", "EUR/USD (OTC)", "GBP/USD (OTC)", "USD/JPY (OTC)",
            "NZD/USD (OTC)", "AUD/JPY (OTC)", "CAD/CHF (OTC)", "CAD/JPY (OTC)",
            "CHF/JPY (OTC)", "USD/BDT (OTC)", "USD/COP (OTC)", "USD/DZD (OTC)",
            "USD/EGP (OTC)", "EUR/CAD (OTC)", "GBP/CAD (OTC)", "AUD/CAD (OTC)"
        ];

        const selectedPairs = new Set();

        function showNotification(msg) {
            const nav = document.getElementById("notification");
            nav.textContent = msg;
            nav.style.display = "block";
            setTimeout(() => {
                nav.style.display = "none";
            }, 3000);
        }

        function parseTimeToDate(timeValue) {
            const [hours, minutes] = timeValue.split(":").map(Number);
            const dt = new Date();
            dt.setSeconds(0, 0);
            dt.setHours(hours, minutes, 0, 0);
            return dt;
        }

        function getNowTimeString() {
            const now = new Date();
            const hh = String(now.getHours()).padStart(2, "0");
            const mm = String(now.getMinutes()).padStart(2, "0");
            return `${hh}:${mm}`;
        }

        function applyCurrentTimeToStart() {
            document.getElementById("start-time").value = getNowTimeString();
        }

        function getNextMarketDirection(previousDirection, mode) {
            // Synthetic OTC movement model (simulation only)
            let keepSameChance = 0.6;
            if (mode === "trend") {
                keepSameChance = 0.82;
            } else if (mode === "range") {
                keepSameChance = 0.35;
            } else {
                keepSameChance = 0.6;
            }

            if (!previousDirection) {
                return Math.random() < 0.5 ? "PUT" : "CALL";
            }
            return Math.random() < keepSameChance
                ? previousDirection
                : (previousDirection === "PUT" ? "CALL" : "PUT");
        }

        function chooseSignalDirection(marketDirection, consecutiveAgainstMarket, blockStart) {
            // Core bias: 60% PUT / 40% CALL.
            // Smart correction: never allow >2 opposite signals in a row.
            if (consecutiveAgainstMarket >= 2) {
                return marketDirection;
            }

            if (blockStart) {
                // At new block we still keep market alignment priority.
                const alignChance = marketDirection === "PUT" ? 0.75 : 0.6;
                if (Math.random() < alignChance) {
                    return marketDirection;
                }
            }

            return Math.random() < 0.6 ? "PUT" : "CALL";
        }

        function getModelConfig() {
            const model = document.getElementById("generator-model").value;
            if (model === "M1_3") {
                return { timeframeLabel: "M1", step: 3, blockSize: 3, fullDayForM15: false };
            }
            if (model === "M1_5") {
                return { timeframeLabel: "M1", step: 5, blockSize: 5, fullDayForM15: false };
            }
            return { timeframeLabel: "M15", step: 15, blockSize: 3, fullDayForM15: true };
        }

        function renderCurrencyPairs() {
            const list = document.getElementById("currency-list");
            pairs.forEach((pair) => {
                const card = document.createElement("div");
                card.className = "pair-card";
                card.textContent = pair;
                card.onclick = () => {
                    const maxPairs = Number(document.getElementById("pair-limit").value);
                    if (selectedPairs.has(pair)) {
                        selectedPairs.delete(pair);
                        card.classList.remove("selected");
                    } else if (selectedPairs.size < maxPairs) {
                        selectedPairs.add(pair);
                        card.classList.add("selected");
                    } else {
                        showNotification(`Portfolio Limit: Select only ${maxPairs} pair(s).`);
                    }
                };
                list.appendChild(card);
            });
        }

        function generateTrades() {
            const maxPairs = Number(document.getElementById("pair-limit").value);
            const modelConfig = getModelConfig();
            const modelStep = modelConfig.step;
            const autoStartNow = document.getElementById("auto-start-now").checked;
            const marketMode = document.getElementById("market-mode").value;
            const lastDirectionHint = document.getElementById("last-direction").value;
            if (autoStartNow) {
                applyCurrentTimeToStart();
            }

            const startValue = document.getElementById("start-time").value;
            const endValue = document.getElementById("end-time").value;

            if (!startValue || !endValue) {
                showNotification("Please define both start and end time.");
                return;
            }

            if (selectedPairs.size !== maxPairs) {
                showNotification(`Please select exactly ${maxPairs} pair(s).`);
                return;
            }

            const startTime = modelConfig.fullDayForM15 ? parseTimeToDate("00:00") : parseTimeToDate(startValue);
            const endTime = modelConfig.fullDayForM15 ? parseTimeToDate("23:45") : parseTimeToDate(endValue);

            if (startTime >= endTime) {
                showNotification("Start time must be earlier than end time.");
                return;
            }

            const loader = document.getElementById("loading-spinner");
            const container = document.getElementById("trades");
            container.innerHTML = "";
            loader.style.display = "block";

            setTimeout(() => {
                loader.style.display = "none";
                const selected = Array.from(selectedPairs);
                let currentTime = new Date(startTime.getTime());
                const blockSize = modelConfig.blockSize;
                let currentBlockDirection = null;
                let blockCounter = 0;
                let marketDirection = lastDirectionHint === "AUTO" ? null : lastDirectionHint;
                let consecutiveAgainstMarket = 0;

                while (currentTime <= endTime) {
                    const pair = selected[Math.floor(Math.random() * selected.length)];
                    const timeStr = currentTime.toLocaleTimeString("en-GB", { hour: "2-digit", minute: "2-digit" });
                    marketDirection = getNextMarketDirection(marketDirection, marketMode);

                    // Keep direction in fixed-size blocks:
                    // model 3 => 3 same direction signals, model 5 => 5 same direction signals.
                    if (blockCounter === 0) {
                        currentBlockDirection = chooseSignalDirection(
                            marketDirection,
                            consecutiveAgainstMarket,
                            true
                        );
                    }

                    const isPut = currentBlockDirection === "PUT";

                    const card = document.createElement("div");
                    card.className = "signal-card";
                    card.dataset.dirName = isPut ? "PUT" : "CALL";
                    card.innerHTML = `
                        <span class="pair">${pair}</span>
                        <div class="time">${timeStr}</div>
                        <span class="direction ${isPut ? "dir-put" : "dir-call"}">
                            ${isPut ? "↓ PUT" : "↑ CALL"}
                        </span>
                    `;
                    container.appendChild(card);

                    if (currentBlockDirection !== marketDirection) {
                        consecutiveAgainstMarket += 1;
                    } else {
                        consecutiveAgainstMarket = 0;
                    }

                    blockCounter = (blockCounter + 1) % blockSize;

                    currentTime.setMinutes(currentTime.getMinutes() + modelStep);
                }

                showNotification(`Smart signals generated (${modelConfig.timeframeLabel}, ${modelStep}m, ${marketMode} mode).`);
            }, 700);
        }

        function copyTrades() {
            const cards = document.querySelectorAll(".signal-card");
            if (cards.length === 0) {
                showNotification("No data available to copy.");
                return;
            }

            function toExportPairFormat(pairText, timeframeLabel) {
                // Example display: "USD/BRL (OTC)"
                // M1/M15 export => "USDBRL-OTC"
                const rawPair = pairText
                    .replace(/\s*\(OTC\)\s*/i, "")
                    .replace("/", "")
                    .replace(/\s+/g, "");
                return `${rawPair}-OTC`;
            }

            const modelConfig = getModelConfig();
            let text = "";
            cards.forEach((card, index) => {
                const pair = card.querySelector(".pair").textContent;
                const time = card.querySelector(".time").textContent;
                const dir = card.dataset.dirName;
                const exportPair = toExportPairFormat(pair, modelConfig.timeframeLabel);
                text += `${modelConfig.timeframeLabel};${exportPair};${time};${dir}`;
                if (index < cards.length - 1) {
                    text += "\n";
                }
            });

            navigator.clipboard.writeText(text).then(() => {
                showNotification("Signals copied in requested format!");
            }).catch(() => {
                const el = document.createElement("textarea");
                el.value = text;
                document.body.appendChild(el);
                el.select();
                document.execCommand("copy");
                document.body.removeChild(el);
                showNotification("Signals copied in requested format!");
            });
        }

        document.getElementById("pair-limit").addEventListener("change", () => {
            const maxPairs = Number(document.getElementById("pair-limit").value);
            if (selectedPairs.size > maxPairs) {
                selectedPairs.clear();
                document.querySelectorAll(".pair-card").forEach((card) => card.classList.remove("selected"));
                showNotification(`Selection reset. Choose ${maxPairs} pair(s).`);
            }
        });

        document.getElementById("set-now-btn").addEventListener("click", () => {
            applyCurrentTimeToStart();
            showNotification("Start time set to current time.");
        });

        document.getElementById("generator-model").addEventListener("change", () => {
            const modelConfig = getModelConfig();
            if (modelConfig.timeframeLabel === "M15") {
                document.getElementById("start-time").value = "00:00";
                document.getElementById("end-time").value = "23:45";
                showNotification("M15 mode uses full-day schedule (00:00 to 23:45).");
            }
        });

        renderCurrencyPairs();
    </script>
</body>
</html>
