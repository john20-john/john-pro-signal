<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JOHN PRO | ADVANCED SIGNAL GENERATOR</title>
    <style>
        :root {
            --primary: #f1c40f;
            --secondary: #3498db;
            --accent: #e67e22;
            --bg-dark: #0a0b10;
            --glass: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background: var(--bg-dark);
            background-image: 
                radial-gradient(circle at 20% 30%, rgba(241, 196, 15, 0.05) 0%, transparent 50%),
                radial-gradient(circle at 80% 70%, rgba(52, 152, 219, 0.05) 0%, transparent 50%);
            color: #ffffff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px;
            overflow-x: hidden;
        }

        .container {
            max-width: 800px;
            width: 100%;
            background: var(--glass);
            backdrop-filter: blur(15px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 40px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
        }

        header {
            margin-bottom: 40px;
        }

        h1 {
            font-size: 2.8rem;
            letter-spacing: -1px;
            margin-bottom: 10px;
            font-weight: 800;
        }

        .gold-text {
            background: linear-gradient(135deg, #f1c40f, #f39c12);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .blue-text {
            color: var(--secondary);
            text-shadow: 0 0 20px rgba(52, 152, 219, 0.3);
        }

        .subtitle {
            color: #8892b0;
            font-size: 1.1rem;
        }

        .section-title {
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--primary);
            margin-bottom: 20px;
            font-weight: 600;
        }

        #currency-list {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 12px;
            margin-bottom: 30px;
        }

        .pair-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--glass-border);
            padding: 15px;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            font-weight: 500;
            color: #ccd6f6;
        }

        .pair-card:hover {
            background: rgba(255, 255, 255, 0.08);
            transform: translateY(-3px);
            border-color: var(--primary);
        }

        .pair-card.selected {
            background: var(--primary);
            color: #000;
            border-color: var(--primary);
            box-shadow: 0 0 20px rgba(241, 196, 15, 0.3);
        }

        .actions {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin-top: 20px;
        }

        button {
            padding: 16px 32px;
            font-size: 1rem;
            font-weight: 700;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s;
            border: none;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .btn-generate {
            background: var(--primary);
            color: #000;
        }

        .btn-generate:hover {
            background: #ffdb4d;
            transform: scale(1.02);
            box-shadow: 0 10px 20px rgba(241, 196, 15, 0.2);
        }

        .btn-copy {
            background: transparent;
            border: 1px solid var(--glass-border);
            color: #fff;
        }

        .btn-copy:hover {
            background: var(--glass-border);
        }

        #loading-spinner {
            display: none;
            margin: 30px auto;
            width: 40px;
            height: 40px;
            border: 3px solid rgba(241, 196, 15, 0.1);
            border-top: 3px solid var(--primary);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin { 100% { transform: rotate(360deg); } }

        #trades {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 15px;
            margin-top: 40px;
            width: 100%;
        }

        .signal-card {
            background: linear-gradient(145deg, rgba(255,255,255,0.05), rgba(255,255,255,0.01));
            border-radius: 16px;
            padding: 20px;
            border: 1px solid var(--glass-border);
            text-align: left;
            position: relative;
            overflow: hidden;
            animation: fadeIn 0.5s ease forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .signal-card .pair {
            font-weight: 700;
            font-size: 0.9rem;
            color: #8892b0;
            margin-bottom: 8px;
            display: block;
        }

        .signal-card .time {
            font-size: 1.4rem;
            font-weight: 800;
            margin-bottom: 4px;
        }

        .signal-card .direction {
            font-size: 0.8rem;
            font-weight: 800;
            padding: 4px 12px;
            border-radius: 20px;
            display: inline-block;
        }

        .dir-call { background: rgba(46, 204, 113, 0.1); color: #2ecc71; }
        .dir-put { background: rgba(231, 76, 60, 0.1); color: #e74c3c; }

        #notification {
            position: fixed;
            bottom: 30px;
            right: 30px;
            padding: 15px 25px;
            background: var(--secondary);
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            display: none;
            z-index: 1000;
            animation: slideUp 0.3s ease;
        }

        @keyframes slideUp { from { transform: translateY(100px); } to { transform: translateY(0); } }

        @media (max-width: 600px) {
            .container { padding: 25px 15px; }
            h1 { font-size: 2rem; }
            #currency-list { grid-template-columns: 1fr 1fr; }
        }
    </style>
</head>
<body>
    <div id="notification"></div>

    <div class="container">
        <header>
            <h1><span class="gold-text">JOHN PRO</span> <span class="blue-text">AI</span></h1>
            <p class="subtitle">Next-Generation Binary Options Signal Engine</p>
        </header>

        <div class="section-title">Select 4 Trading Assets</div>
        <div id="currency-list"></div>

        <div class="actions">
            <button class="btn-generate" onclick="generateTrades()">
                <svg width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"/></svg>
                Analyze Market
            </button>
            <button class="btn-copy" onclick="copyTrades()">
                <svg width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 5H6a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2v-1M8 5a2 2 0 002 2h2a2 2 0 002-2M8 5a2 2 0 012-2h2a2 2 0 012 2m0 0h2a2 2 0 012 2v3m2 4H10m0 0l3-3m-3 3l3 3"/></svg>
                Copy All
            </button>
        </div>

        <div id="loading-spinner"></div>
        <div id="trades"></div>
    </div>

    <script>
        const pairs = [
            "CAD/CHF (OTC)", "CAD/JPY (OTC)", "CHF/JPY (OTC)", "USD/BDT (OTC)",
            "USD/BRL (OTC)", "USD/COP (OTC)", "USD/DZD (OTC)", "USD/EGP (OTC)"
        ];

        const selectedPairs = new Set();

        function showNotification(msg) {
            const nav = document.getElementById('notification');
            nav.textContent = msg;
            nav.style.display = 'block';
            setTimeout(() => nav.style.display = 'none', 3000);
        }

        function renderCurrencyPairs() {
            const list = document.getElementById('currency-list');
            pairs.forEach(pair => {
                const card = document.createElement('div');
                card.className = 'pair-card';
                card.textContent = pair;
                card.onclick = () => {
                    if (selectedPairs.has(pair)) {
                        selectedPairs.delete(pair);
                        card.classList.remove('selected');
                    } else if (selectedPairs.size < 4) {
                        selectedPairs.add(pair);
                        card.classList.add('selected');
                    } else {
                        showNotification("Portfolio Limit: Select exactly 4 pairs.");
                    }
                };
                list.appendChild(card);
            });
        }

        function generateTrades() {
            if (selectedPairs.size !== 4) {
                showNotification("Error: Please select 4 assets to begin analysis.");
                return;
            }

            const loader = document.getElementById('loading-spinner');
            const container = document.getElementById('trades');
            container.innerHTML = '';
            loader.style.display = 'block';

            setTimeout(() => {
                loader.style.display = 'none';
                const now = new Date();
                const endTime = new Date();
                endTime.setHours(23, 59, 59);

                const selected = Array.from(selectedPairs);
                let currentTime = new Date(now.getTime());
                currentTime.setMinutes(currentTime.getMinutes() + 2);

                while (currentTime < endTime) {
                    const pair = selected[Math.floor(Math.random() * selected.length)];
                    const timeStr = currentTime.toLocaleTimeString('en-GB', { hour: '2-digit', minute: '2-digit' });
                    const isCall = currentTime.getMinutes() % 2 !== 0;
                    
                    const card = document.createElement('div');
                    card.className = 'signal-card';
                    // Store technical direction value in data attribute for clean copying
                    card.dataset.dirName = isCall ? 'CALL' : 'PUT';
                    card.innerHTML = `
                        <span class="pair">${pair}</span>
                        <div class="time">${timeStr}</div>
                        <span class="direction ${isCall ? 'dir-call' : 'dir-put'}">
                            ${isCall ? '↑ CALL' : '↓ PUT'}
                        </span>
                    `;
                    container.appendChild(card);
                    
                    currentTime.setMinutes(currentTime.getMinutes() + Math.floor(Math.random() * 10) + 5);
                }
                showNotification("Algorithm Success: Signals generated until 23:59");
            }, 2000);
        }

        function copyTrades() {
            const cards = document.querySelectorAll('.signal-card');
            if (cards.length === 0) {
                showNotification("No data available to copy.");
                return;
            }

            let text = "";
            cards.forEach((card, index) => {
                const pair = card.querySelector('.pair').textContent;
                const time = card.querySelector('.time').textContent;
                const dir = card.dataset.dirName; // Get clean CALL/PUT value
                
                text += `${pair} ➪ ${time} ${dir}`;
                // Add newline if not the last item
                if (index < cards.length - 1) text += "\n";
            });

            const el = document.createElement('textarea');
            el.value = text;
            document.body.appendChild(el);
            el.select();
            document.execCommand('copy');
            document.body.removeChild(el);
            showNotification("Signals copied in requested format!");
        }

        renderCurrencyPairs();
    </script>
</body>
</html>
